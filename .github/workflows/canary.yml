name: Canary

on:
  push:
    branches:
      - main

jobs:
  canary:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: ${{ vars.CANARY_REGISTRY }}

      - name: Enable Corepack
        run: npm i -g corepack

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Test
        run: yarn test

      - name: Publish canary to canary registry
        run: npm publish --access public --tag canary --registry ${{ vars.CANARY_REGISTRY }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PUBLISH_CANARY_VERDACCIO_TOKEN }}
