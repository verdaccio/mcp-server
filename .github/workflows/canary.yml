name: Canary

on:
  push:
    branches:
      - main

jobs:
  canary:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: npm i -g corepack

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Test
        run: yarn test
      - name: Declare some variables
        shell: bash
        run: |
          echo "sha_short=$(git rev-parse --short "$GITHUB_SHA")" >> "$GITHUB_ENV"
      - name: Bump up package
        run: npm version prerelease --no-git-tag-version --preid ${{ env.sha_short }}   
      - name: Publish
        run: sh scripts/publish-prerelease.sh
        env:
          REGISTRY_AUTH_TOKEN: ${{ secrets.PUBLISH_CANARY_VERDACCIO_TOKEN }}
          REGISTRY_URL: rg.verdaccio.org
