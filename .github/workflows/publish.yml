name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.2.0)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history and push access for the version commit
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Enable Corepack
        run: npm i -g corepack

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # Strip leading 'v' from tag name (v1.2.0 → 1.2.0)
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump package version
        run: npm version ${{ steps.version.outputs.value }} --no-git-tag-version

      - name: Commit and tag version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: release v${{ steps.version.outputs.value }}"
          git tag "v${{ steps.version.outputs.value }}" --force
          git push origin HEAD --tags --force

      - name: Publish to registry.npmjs.org
        run: bash scripts/publish-release.sh
        env:
          REGISTRY_AUTH_TOKEN: ${{ secrets.REGISTRY_AUTH_TOKEN }}
          REGISTRY_URL: https://registry.npmjs.org
